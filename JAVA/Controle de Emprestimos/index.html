<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Empréstimos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-4">Controle de Empréstimos</h1>

    <!-- FORMULÁRIO -->

    <div class="card p-3 mb-4">

        <div class="row">

            <div class="col-md-3">
                <label class="form-label">Nome</label>
                <input type="text" id="nome" class="form-control">
            </div>

            <div class="col-md-2">
                <label class="form-label">Valor</label>
                <input type="number" id="valor" class="form-control">
            </div>

            <div class="col-md-2">
                <label class="form-label">Data</label>
                <input type="date" id="data" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Descrição</label>
                <input type="text" id="descricao" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button id="btnAdicionar" class="btn btn-primary w-100" onclick="adicionarValor()">
                    Adicionar
                </button>
            </div>

        </div>

    </div>

    <!-- TABELA -->

    <div class="table-responsive">

        <table class="table table-striped table-bordered">

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="tabelaEmprestimos">

                <!-- Linhas criadas pelo JavaScript -->

            </tbody>

        </table>

    </div>

    <!-- TOTAL -->

    <div class="text-end mt-3">

        <h4>
            Total Pendente:
            <span id="total">R$ 0,00</span>
        </h4>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
